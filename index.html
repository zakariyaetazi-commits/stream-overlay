<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:transparent; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; width:900px; }

.top-bar {
  display:flex;
  align-items:center;
  justify-content:space-between;
  background:#fff;
  border-radius:16px;
  padding:10px 16px;
  margin-bottom:12px;
  box-shadow:0 4px 24px rgba(0,0,0,0.18);
}
.team-info { display:flex; align-items:center; gap:10px; }
.team-logo { width:44px; height:44px; border-radius:50%; object-fit:cover; display:flex; align-items:center; justify-content:center; font-size:22px; border:2px solid #eee; overflow:hidden; }
.team-logo img { width:100%; height:100%; object-fit:cover; border-radius:50%; }
.team-name { font-size:16px; font-weight:700; color:#111; }
.team-formation { font-size:12px; color:#888; }
.score-area { display:flex; align-items:center; gap:12px; }
.score-num { font-size:32px; font-weight:900; color:#111; min-width:36px; text-align:center; }
.score-sep { font-size:28px; font-weight:700; color:#ccc; }
.timer-badge { background:#111; color:#fff; border-radius:8px; padding:4px 12px; font-size:14px; font-weight:700; font-family:monospace; }

.lineups { display:flex; gap:12px; }
.lineup-card {
  flex:1;
  background:#111;
  border-radius:16px;
  padding:14px;
  box-shadow:0 4px 24px rgba(0,0,0,0.22);
  min-height:500px;
}
.lineup-title { font-size:13px; font-weight:700; color:#888; text-transform:uppercase; letter-spacing:1px; margin-bottom:12px; text-align:center; }
.player-item {
  display:flex;
  align-items:center;
  gap:10px;
  padding:6px 0;
  border-bottom:1px solid #1e1e1e;
}
.player-item:last-child { border-bottom:none; }
.player-avatar {
  width:34px;
  height:34px;
  border-radius:50%;
  background:#222;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:12px;
  font-weight:700;
  color:#fff;
  flex-shrink:0;
  overflow:hidden;
  border:2px solid #333;
}
.player-avatar img { width:100%; height:100%; object-fit:cover; border-radius:50%; }
.player-num-badge { width:20px; font-size:11px; color:#555; text-align:center; flex-shrink:0; }
.player-name { font-size:14px; color:#fff; font-weight:500; }

.switching-indicator {
  display:flex;
  justify-content:center;
  gap:6px;
  margin-top:10px;
}
.dot { width:8px; height:8px; border-radius:50%; background:#333; transition:background 0.3s; }
.dot.active { background:#fff; }
</style>
</head>
<body>

<div class="top-bar">
  <div class="team-info">
    <div class="team-logo" id="logo1">🏳</div>
    <div>
      <div class="team-name" id="name1">Team One</div>
      <div class="team-formation" id="form1">4-3-3</div>
    </div>
  </div>
  <div class="score-area">
    <div class="score-num" id="score1">0</div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:4px;">
      <div class="timer-badge" id="timer">00:00</div>
      <div class="score-sep">:</div>
    </div>
    <div class="score-num" id="score2">0</div>
  </div>
  <div class="team-info" style="flex-direction:row-reverse;">
    <div class="team-logo" id="logo2">🏳</div>
    <div style="text-align:right;">
      <div class="team-name" id="name2">Team Two</div>
      <div class="team-formation" id="form2">4-4-2</div>
    </div>
  </div>
</div>

<div class="lineups">
  <div class="lineup-card" id="panel1">
    <div class="lineup-title" id="panel1-title">Team One</div>
    <div id="players1"></div>
  </div>
  <div class="lineup-card" id="panel2">
    <div class="lineup-title" id="panel2-title">Team Two</div>
    <div id="players2"></div>
  </div>
</div>

<div class="switching-indicator">
  <div class="dot active" id="dot1"></div>
  <div class="dot" id="dot2"></div>
</div>

<script>
let current = 0;
let matchData = null;

function loadData() {
  try {
    const raw = localStorage.getItem('matchData');
    if (!raw) return;
    matchData = JSON.parse(raw);
    render();
  } catch(e) {}
}

function render() {
  if (!matchData) return;
  const d = matchData;

  document.getElementById('name1').textContent = d.team1.name || 'Team One';
  document.getElementById('name2').textContent = d.team2.name || 'Team Two';
  document.getElementById('form1').textContent = d.team1.formation || '';
  document.getElementById('form2').textContent = d.team2.formation || '';
  document.getElementById('score1').textContent = d.score[0] || 0;
  document.getElementById('score2').textContent = d.score[1] || 0;

  const t = d.timer || 0;
  const m = Math.floor(t/60);
  const s = t%60;
  document.getElementById('timer').textContent = String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');

  setLogo('logo1', d.team1.logo, d.team1.color);
  setLogo('logo2', d.team2.logo, d.team2.color);

  renderPlayers('players1', d.team1.players || [], d.team1.color);
  renderPlayers('players2', d.team2.players || [], d.team2.color);

  document.getElementById('panel1-title').textContent = d.team1.name || 'Team One';
  document.getElementById('panel2-title').textContent = d.team2.name || 'Team Two';
  document.getElementById('panel1').style.borderTop = '3px solid ' + (d.team1.color || '#1d9bf0');
  document.getElementById('panel2').style.borderTop = '3px solid ' + (d.team2.color || '#e63946');
}

function setLogo(id, src, color) {
  const el = document.getElementById(id);
  el.style.borderColor = color || '#eee';
  if (src) {
    el.innerHTML = '<img src="'+src+'">';
  } else {
    el.textContent = '🏳';
  }
}

function renderPlayers(id, players, color) {
  const el = document.getElementById(id);
  el.innerHTML = '';
  for(let i=0;i<11;i++) {
    const p = players[i] || {};
    const div = document.createElement('div');
    div.className = 'player-item';
    const avatar = document.createElement('div');
    avatar.className = 'player-avatar';
    avatar.style.borderColor = color || '#333';
    if(p.pic) {
      avatar.innerHTML = '<img src="'+p.pic+'">';
    } else {
      avatar.textContent = (i+1);
      avatar.style.background = color ? color+'33' : '#222';
      avatar.style.color = color || '#fff';
    }
    const num = document.createElement('div');
    num.className = 'player-num-badge';
    num.textContent = i+1;
    const name = document.createElement('div');
    name.className = 'player-name';
    name.textContent = p.name || 'Player '+(i+1);
    div.appendChild(avatar);
    div.appendChild(num);
    div.appendChild(name);
    el.appendChild(div);
  }
}

// Switch between showing team 1 only vs team 2 only on small screens
// On this wide layout both show, but dots indicate "focus"
function switchFocus() {
  current = (current+1)%2;
  document.getElementById('dot1').classList.toggle('active', current===0);
  document.getElementById('dot2').classList.toggle('active', current===1);
  const c1 = document.getElementById('panel1');
  const c2 = document.getElementById('panel2');
  if(current===0) {
    c1.style.opacity='1'; c1.style.transform='scale(1)';
    c2.style.opacity='0.4'; c2.style.transform='scale(0.97)';
  } else {
    c2.style.opacity='1'; c2.style.transform='scale(1)';
    c1.style.opacity='0.4'; c1.style.transform='scale(0.97)';
  }
  document.getElementById('panel1').style.transition='all 0.5s ease';
  document.getElementById('panel2').style.transition='all 0.5s ease';
}

loadData();
setInterval(loadData, 2000);
setInterval(switchFocus, 10000);
</script>
</body>
</html>
